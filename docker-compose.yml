# version: '3.8' -> now deprecated, so we can delete

services:
  # --- NGINX ---
  nginx:
    image: nginx:1.25-alpine
    container_name: ft_nginx
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - transcendence-net
    restart: always

  # --- BACKEND (NestJS) ---
  backend:
    build: ./backend
    container_name: ft_backend
    # ports:
    #   - "3000:3000"             WILL DELETE, NOW NGINX HANDLES THIS
    expose:
      - "3000"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    env_file:
      - ./backend/.env
    depends_on:
      - db
    networks:
      - transcendence-net

  # --- FRONTEND (Vue) ---
  frontend:
    build: ./frontend
    container_name: ft_frontend
    # ports:
    #   - "5173:5173"              WILL DELETE, NOW NGINX HANDLES THIS
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - transcendence-net

  # --- DATABASE (PostgreSQL) ---
  db:
    image: postgres:15
    container_name: ft_postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: transcendence_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - transcendence-net

  # --- Database GUI ---
  pgadmin:
    image: dpage/pgadmin4
    container_name: ft_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "5050:80"
    volumes:
      - ./pgadmin-servers.json:/pgadmin4/servers.json
      - ./pgadmin-pgpass:/pgpass
    depends_on:
      - db
    networks:
      - transcendence-net

networks:
  transcendence-net:
    driver: bridge

volumes:
  pgdata:
